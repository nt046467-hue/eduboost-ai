[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# IMPORTANT: Static files must be excluded from SPA redirect
# These need to be checked BEFORE the catch-all /* rule
# Serve ads.txt - with fallback error handling
[[redirects]]
  from = "/ads.txt"
  to = "/.netlify/functions/ads"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.svg"
  to = "/favicon.svg"
  status = 200
  force = true

# SPA catch-all redirect (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache control for favicon
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type = "image/svg+xml"

# Cache control for static files
[[headers]]
  for = "/*.{svg,png,jpg,jpeg,gif,webp}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for ads.txt and robots.txt
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain"

# Error handling headers for Netlify functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"
