    />

    <!-- Favicon -->

    <!-- 
      CRITICAL: Theme loader script
      Prevents Flash Of Unstyled Content (FOUC) by applying theme before React renders.
      This script runs synchronously before any other scripts to ensure theme is set early.
    -->
    <script>
      (function () {
        const THEME_KEY = "theme-preference";
        const LIGHT_THEME = "light";
        const DARK_THEME = "dark";

        function getInitialTheme() {
          // Priority: stored preference > system preference > default (dark)
          const stored = localStorage.getItem(THEME_KEY);
          if (stored === LIGHT_THEME || stored === DARK_THEME) {
            return stored;
          }

          // Check system preference
          if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            return DARK_THEME;
          }

          return DARK_THEME; // Default fallback
        }

        function applyTheme(theme) {
          // Apply to <html> element (not body)
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
          localStorage.setItem(THEME_KEY, theme);
        }

        // Apply theme immediately, before React renders
        const theme = getInitialTheme();
        applyTheme(theme);
      })();
    </script>

    <!-- Preload critical fonts -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://esm.sh" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

    <!-- Critical inline CSS for faster FCP -->
    <style>
      /* Define theme variables early to prevent FOUC */
      :root {
        /* Light theme (default) */
        --bg-primary: #ffffff;
        --bg-secondary: #f8f9fa;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --accent-color: #00e5ff;
        color-scheme: light;
      }

      [data-theme="dark"] {
        /* Dark theme */
        --bg-primary: #0a0a0a;
        --bg-secondary: #111827;
        --text-primary: #f3f4f6;
        --text-secondary: #d1d5db;
        --accent-color: #00e5ff;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
        scroll-behavior: smooth;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }
      /* Prevent layout shift while fonts load */
      @font-face {
        font-family: "Inter";
        src: local("Inter");
        font-display: swap;
      }
      .text-cyan {
        color: var(--accent-color);
      }
      .bg-cyan {
        background-color: var(--accent-color);
      }
      .border-cyan {
        border-color: var(--accent-color);
      }
      .shadow-cyan {
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-secondary);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }
    </style>

    <!-- Defer Tailwind CSS to avoid blocking FCP -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script" />

    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",

  </body>
