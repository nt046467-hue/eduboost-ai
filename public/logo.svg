<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8cc;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-bg { fill: url(#grad1); }
      .logo-text { fill: #000; font-family: Arial, sans-serif; font-size: 80px; font-weight: bold; }
      .logo-label { fill: #fff; font-family: Arial, sans-serif; font-size: 24px; font-weight: 600; }
    </style>
  </defs>
  <rect class="logo-bg" width="200" height="200" rx="20"/>
  <text class="logo-text" x="100" y="130" text-anchor="middle">E</text>
  <text class="logo-label" x="100" y="170" text-anchor="middle">EDUBOOST AI</text>
</svg>
